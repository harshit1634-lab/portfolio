<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f1117 0%,#13151f 100%);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;
  user-select:none;-webkit-user-select:none}
.gate{background:#1a1d27;border:1px solid #2d3048;border-radius:20px;
  padding:48px 44px;max-width:440px;width:100%;
  box-shadow:0 24px 80px rgba(0,0,0,.6);text-align:center}
.lock-icon{font-size:40px;margin-bottom:20px;display:block;filter:drop-shadow(0 0 12px #6366f1aa)}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(99,102,241,.12);
  border:1px solid rgba(99,102,241,.3);border-radius:100px;padding:6px 16px;
  font-size:11px;color:#818cf8;letter-spacing:.8px;margin-bottom:24px;font-weight:600;text-transform:uppercase}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#818cf8;
  box-shadow:0 0 8px #818cf8;animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.3}}
h1{font-size:24px;font-weight:700;color:#f1f5f9;line-height:1.2;margin-bottom:8px;letter-spacing:-.3px}
.sub{font-size:13.5px;color:#64748b;margin-bottom:32px;line-height:1.7}
.sub a{color:#818cf8;text-decoration:none}
.field{position:relative;margin-bottom:12px}
input[type=password]{width:100%;background:#0f1117;border:1.5px solid #2d3048;
  border-radius:12px;color:#f1f5f9;font-size:15px;padding:14px 52px 14px 18px;
  outline:none;transition:border-color .2s;letter-spacing:3px}
input[type=password]::placeholder{letter-spacing:0;color:#374151}
input[type=password]:focus{border-color:#6366f1}
input[type=password].shake{animation:shake .35s;border-color:#ef4444}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#4b5563;cursor:pointer;padding:4px;font-size:18px}
.btn{width:100%;background:#6366f1;color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:600;padding:14px;cursor:pointer;
  transition:background .2s,transform .1s;letter-spacing:.2px;margin-top:4px}
.btn:hover{background:#4f46e5}
.btn:active{transform:scale(.98)}
.btn:disabled{background:#374151;cursor:not-allowed}
.err{color:#f87171;font-size:13px;margin-top:10px;min-height:18px}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;
  margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{margin-top:28px;padding-top:20px;border-top:1px solid #1e2235;
  font-size:11.5px;color:#374151;line-height:1.8}
.footer strong{color:#6366f1}
.enc-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;
  color:#374151;margin-top:8px;letter-spacing:.5px}
</style>
</head>

// Pre-check hash (SHA-256 of password) — avoids expensive PBKDF2 on wrong passwords
const PWHASH = "69d2480121ab122c44aa553444be0c202dd5cbec30807d6e7f48285aa87a6341";

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function deriveKey(password, salt) {
  const keyMaterial = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, hash:'SHA-256', iterations:310000 },
    keyMaterial,
    { name:'AES-GCM', length:256 },
    false, ['decrypt']
  );
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('unlockBtn');
  const err = document.getElementById('err');
  const inp = document.getElementById('pw');
  
  if (!pw) { err.textContent='Please enter the password.'; return; }
  
  // Quick pre-check before running expensive PBKDF2
  const h = await sha256hex(pw);
  if (h !== PWHASH) {
    inp.classList.add('shake');
    err.textContent='Incorrect password.';
    setTimeout(()=>inp.classList.remove('shake'), 400);
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="display:block"></div>';
  err.textContent = 'Decrypting…';
  
  try {
    // Decode packed bytes: salt(16) + nonce(12) + ciphertext
    const raw = Uint8Array.from(atob(PAYLOAD), c=>c.charCodeAt(0));
    const salt = raw.slice(0,16);
    const nonce = raw.slice(16,28);
    const ciphertext = raw.slice(28);
    
    const key = await deriveKey(pw, salt);
    const plainBuf = await crypto.subtle.decrypt(
      { name:'AES-GCM', iv:nonce }, key, ciphertext
    );
    const html = new TextDecoder().decode(plainBuf);
    
    document.open(); document.write(html); document.close();
  } catch(e) {
    err.textContent = 'Decryption failed. Wrong password or corrupted file.';
    btn.disabled = false;
    btn.textContent = 'Decrypt & Open →';
  }
}

function toggleEye() {
  const inp = document.getElementById('pw');
  const btn = document.getElementById('eyeBtn');
  inp.type = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁' : '🙈';
}

document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });

// Disable right-click context menu
document.addEventListener('contextmenu', e=>e.preventDefault());

// Disable common copy shortcuts (Ctrl+U view source, Ctrl+S save, F12)
document.addEventListener('keydown', e=>{
  if ((e.ctrlKey||e.metaKey) && ['u','s','a','p'].includes(e.key.toLowerCase())) e.preventDefault();
  if (e.key==='F12'||e.key==='F11') e.preventDefault();
});

// Detect DevTools open (basic)
(function devToolsLoop(){
  const t=new Date();
  debugger;
  if(new Date()-t>100){
    document.body.innerHTML='<div style="color:#f87171;text-align:center;padding:60px;font-family:monospace">⚠️ DevTools detected. Please close DevTools to view this page.</div>';
  } else setTimeout(devToolsLoop, 1500);
})();
</script>
